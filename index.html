<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anneler Gününüz Kutlu Olsun 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ff6b8a 0%, #e8194b 30%, #c0133a 60%, #8b0022 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Dancing Script', cursive;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 35%, rgba(255,200,220,0.22) 0%, transparent 65%);
      pointer-events: none;
    }

    .confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    .main-content {
      text-align: center;
      z-index: 10;
      padding: 2rem;
      animation: fade-in-up 1.4s cubic-bezier(.22,1,.36,1) both;
    }

    .date-label {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(14px, 3vw, 20px);
      color: rgba(255, 230, 240, 0.85);
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 16px;
      animation: fade-in-up 1.4s cubic-bezier(.22,1,.36,1) both;
      animation-delay: 0.2s;
    }

    .title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(42px, 10vw, 80px);
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      text-shadow:
        0 2px 30px rgba(0,0,0,0.3),
        0 0 80px rgba(255,180,200,0.4);
      animation: fade-in-up 1.4s cubic-bezier(.22,1,.36,1) both;
      animation-delay: 0.4s;
      max-width: 700px;
    }

    .heart-wrap {
      margin-top: 40px;
      display: inline-block;
      animation: fade-in-up 1.4s cubic-bezier(.22,1,.36,1) both, heartbeat 1.5s ease-in-out 2s infinite;
      animation-delay: 0.8s, 0.8s;
    }

    .heart-svg {
      filter:
        drop-shadow(0 0 18px rgba(255,80,100,0.8))
        drop-shadow(0 0 45px rgba(255,150,170,0.5))
        drop-shadow(0 6px 24px rgba(0,0,0,0.2));
    }

    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(50px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%  { transform: scale(1.18); }
      28%  { transform: scale(1); }
      42%  { transform: scale(1.10); }
      70%  { transform: scale(1); }
    }

    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 8;
      animation: sparkle-anim ease-in-out infinite;
    }

    @keyframes sparkle-anim {
      0%, 100% { opacity: 0; transform: scale(0.4) rotate(0deg); }
      50%       { opacity: 1; transform: scale(1) rotate(180deg); }
    }

    .flower {
      position: fixed;
      font-size: clamp(20px, 4vw, 36px);
      opacity: 0.35;
      animation: sway ease-in-out infinite;
      pointer-events: none;
      z-index: 6;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-10deg) scale(1); }
      50%       { transform: rotate(10deg) scale(1.1); }
    }

    .petal {
      position: fixed;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: petal-fall linear infinite;
      pointer-events: none;
      z-index: 6;
    }

    @keyframes petal-fall {
      0%   { transform: translateY(-40px) rotate(0deg); opacity: 0; }
      8%   { opacity: 0.7; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(110vh) rotate(420deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <canvas class="confetti-canvas" id="confettiCanvas"></canvas>

  <div class="main-content">
    <div class="date-label">✦ &nbsp; 10 Mayıs 2026 &nbsp; ✦</div>
    <div class="title">Anneler Gününüz<br>Kutlu Olsun</div>
    <div class="heart-wrap">
      <svg class="heart-svg" width="110" height="100" viewBox="0 0 110 100">
        <defs>
          <radialGradient id="hg" cx="50%" cy="32%" r="68%">
            <stop offset="0%"   stop-color="#ffb3c6"/>
            <stop offset="30%"  stop-color="#ff4d79"/>
            <stop offset="70%"  stop-color="#e8194b"/>
            <stop offset="100%" stop-color="#9e0031"/>
          </radialGradient>
        </defs>
        <path d="M55 93
                 C55 93 7 63 7 30
                 C7 14 19 4 33 4
                 C43 4 51 10 55 17
                 C59 10 67 4 77 4
                 C91 4 103 14 103 30
                 C103 63 55 93 55 93Z"
              fill="url(#hg)"/>
        <path d="M29 20 C24 20 18 26 18 33" stroke="rgba(255,255,255,0.4)" stroke-width="4" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

<script>
  // ── Flowers & Petals ──
  const flowers = ['🌸','🌹','🌷','🌺'];
  const positions = [
    {top:'2%',left:'2%',delay:0}, {top:'2%',right:'2%',delay:0.5},
    {bottom:'2%',left:'2%',delay:1}, {bottom:'2%',right:'2%',delay:1.5},
    {top:'50%',left:'1%',delay:2}, {top:'50%',right:'1%',delay:2.5}
  ];
  positions.forEach((pos, i) => {
    const el = document.createElement('div');
    el.className = 'flower';
    el.textContent = flowers[i % flowers.length];
    Object.assign(el.style, {
      animationDuration: (3.5 + Math.random() * 2) + 's',
      animationDelay: pos.delay + 's',
      top: pos.top || '', bottom: pos.bottom || '',
      left: pos.left || '', right: pos.right || ''
    });
    document.body.appendChild(el);
  });

  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 10 + Math.random() * 14;
    const dur = 7 + Math.random() * 9;
    Object.assign(p.style, {
      left: (Math.random() * 100) + '%',
      top: '-30px',
      width: size + 'px',
      height: (size * 1.3) + 'px',
      background: `rgba(${[255,100+Math.floor(Math.random()*80),160+Math.floor(Math.random()*60)].join(',')}, 0.3)`,
      animationDuration: dur + 's',
      animationDelay: (Math.random() * dur) + 's'
    });
    document.body.appendChild(p);
  }

  // ── Sparkles ──
  const sparkPos = [[10,15],[88,10],[5,55],[95,50],[20,85],[78,82],[50,5]];
  sparkPos.forEach(([lp,tp]) => {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 0L9.5 6.5L16 8L9.5 9.5L8 16L6.5 9.5L0 8L6.5 6.5Z" fill="rgba(255,240,248,0.85)"/></svg>`;
    Object.assign(s.style, {
      left: lp + '%', top: tp + '%',
      animationDuration: (1.8 + Math.random() * 2) + 's',
      animationDelay: (Math.random() * 2) + 's'
    });
    document.body.appendChild(s);
  });

  // ── Confetti Canvas ──
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  let pieces = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const palette = [
    '#ff6b8a','#ff3366','#ffe0ea','#ffb3c6',
    '#ffffff','#ffd6e0','#c9184a','#ff85a1',
    '#ffccd5','#ff4d6d','#a4133c','#ff9bb5'
  ];

  function spawnBurst(count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 3 + Math.random() * 8;
      pieces.push({
        x: canvas.width / 2,
        y: canvas.height / 3,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - (Math.random() * 4),
        w: 5 + Math.random() * 9,
        h: 5 + Math.random() * 14,
        color: palette[Math.floor(Math.random() * palette.length)],
        rot: Math.random() * Math.PI * 2,
        rv: (Math.random() - 0.5) * 0.2,
        alpha: 1,
        gravity: 0.18 + Math.random() * 0.12
      });
    }
  }

  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces = pieces.filter(p => p.alpha > 0.01);
    pieces.forEach(p => {
      p.vy += p.gravity;
      p.x  += p.vx;
      p.y  += p.vy;
      p.rot += p.rv;
      if (p.y > canvas.height * 0.75) p.alpha -= 0.018;
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.roundRect(-p.w/2, -p.h/2, p.w, p.h, 2);
      ctx.fill();
      ctx.restore();
    });
    requestAnimationFrame(tick);
  }
  tick();

  // Initial burst
  setTimeout(() => spawnBurst(130), 400);
  setTimeout(() => spawnBurst(80), 1100);
  // Periodic bursts
  setInterval(() => spawnBurst(70), 5000);
</script>
</body>
</html>
